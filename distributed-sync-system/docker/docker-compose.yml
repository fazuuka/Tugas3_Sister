services:
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"

  lock-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=lock-1
      - NODE_ROLE=lock
      - NODE_PORT=8000
      - PEERS=lock-2:8001,lock-3:8002
    ports:
      - "8000:8000"

  lock-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=lock-2
      - NODE_ROLE=lock
      - NODE_PORT=8001
      - PEERS=lock-1:8000,lock-3:8002
    ports:
      - "8001:8001"

  lock-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=lock-3
      - NODE_ROLE=lock
      - NODE_PORT=8002
      - PEERS=lock-1:8000,lock-2:8001
    ports:
      - "8002:8002"

  queue-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=queue-1
      - NODE_ROLE=queue
      - NODE_PORT=8100
      - PEERS=queue-2:8101,queue-3:8102
    ports:
      - "8100:8100"

  queue-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=queue-2
      - NODE_ROLE=queue
      - NODE_PORT=8101
      - PEERS=queue-1:8100,queue-3:8102
    ports:
      - "8101:8101"

  queue-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=queue-3
      - NODE_ROLE=queue
      - NODE_PORT=8102
      - PEERS=queue-1:8100,queue-2:8101
    ports:
      - "8102:8102"

  cache-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=cache-1
      - NODE_ROLE=cache
      - NODE_PORT=8200
      - PEERS=cache-2:8201,cache-3:8202
    ports:
      - "8200:8200"

  cache-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=cache-2
      - NODE_ROLE=cache
      - NODE_PORT=8201
      - PEERS=cache-1:8200,cache-3:8202
    ports:
      - "8201:8201"

  cache-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile.node
    env_file:
      - ../.env.example
    environment:
      - NODE_ID=cache-3
      - NODE_ROLE=cache
      - NODE_PORT=8202
      - PEERS=cache-1:8200,cache-2:8201
    ports:
      - "8202:8202"
